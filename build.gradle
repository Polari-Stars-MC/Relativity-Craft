plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    mavenCentral()
    // Add here additional repositories if required by some of the dependencies below.
}

base {
    archivesName = mod_id
}

// Mojang ships Java 25 to end users in 26.1.2, so mods should target Java 25.
java.toolchain.languageVersion = JavaLanguageVersion.of(25)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            clientData()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

static String detectOverrunglOs() {
    def name = System.getProperty("os.name")
    if (name == "FreeBSD") "freebsd"
    else if (name.startsWithAny("Linux", "SunOS", "Unit")) "linux"
    else if (name.startsWithAny("Mac OS X", "Darwin")) "macos"
    else if (name.startsWith("Windows")) "windows"
    else throw new Error("unrecognized platform $name. Please set \"overrunglOs\" manually")
}

def overrunglOs = detectOverrunglOs()

static String detectOverrunglArch(String overrunglOs) {
    def arch = System.getProperty("os.arch")
    switch(overrunglOs) {
        case "freebsd": return "x64"
        case "linux":
            if (arch.startsWithAny("arm", "aarch64")) {
                return arch.contains("64") || arch.startsWith("armv8") ? "arm64" : "arm32"
            }
            else if (arch.startsWith("ppc")) return "ppc64le"
            else if (arch.startsWith("riscv")) return "riscv64"
            else return "x64"
        case "macos": return arch.startsWith("aarch64") ? "arm64" : "x64"
        case "windows": return arch.startsWith("aarch64") ? "arm64" : "x64"
        default: throw new Error("Unrecognized architecture $arch for platform $overrunglOs. Please set \\\"overrunglArch\\\" manually")
    }
}

def overrunglArch = detectOverrunglArch(overrunglOs)
def overrunglNatives = "natives-$overrunglOs-$overrunglArch"

static String nativeArtifactExtension(String os) {
    switch (os) {
        case "macos": return "dylib"
        case "windows": return "dll"
        default: return "so"
    }
}

static String nativeArtifactPrefix(String os) {
    return os == "windows" ? "" : "lib"
}

static String nativeTaskSuffix(String platformId) {
    platformId.split("-").collect { it.capitalize() }.join("")
}

static boolean nativeUsesZig(Map config) {
    return config.os in ["linux", "freebsd"]
}

static boolean nativeCanBuildOnHost(String hostOs, Map config, File zigExecutable) {
    if (hostOs == "windows") {
        if (config.os == "windows") {
            return config.arch == "x64"
        }
        if (config.os == "macos") {
            return false
        }
        if (config.os == "freebsd") {
            return false
        }
        if (config.os == "linux") {
            return zigExecutable.exists() && config.arch in ["x64", "arm64", "arm32", "ppc64le"]
        }
    }
    if (config.os == "macos") {
        return hostOs == "macos"
    }
    if (nativeUsesZig(config)) {
        return zigExecutable.exists()
    }
    return true
}

def nativeProjectDir = file("native")
def nativeLibraryBaseName = "relativity_craft_rapier"
def zigExecutable = file("tools/zig-windows-x86_64-0.13.0/zig.exe")
// Match the desktop platforms Minecraft itself targets in practice.
def nativeTargetMatrix = [
        "linux-x64"   : [os: "linux", arch: "x64", triple: "x86_64-unknown-linux-gnu"],
        "linux-arm64" : [os: "linux", arch: "arm64", triple: "aarch64-unknown-linux-gnu"],
        "macos-x64"   : [os: "macos", arch: "x64", triple: "x86_64-apple-darwin"],
        "macos-arm64" : [os: "macos", arch: "arm64", triple: "aarch64-apple-darwin"],
        "windows-x64" : [os: "windows", arch: "x64", triple: "x86_64-pc-windows-msvc"],
        "windows-arm64": [os: "windows", arch: "arm64", triple: "aarch64-pc-windows-msvc"],
]

def currentNativePlatform = "${overrunglOs}-${overrunglArch}".toString()
if (!nativeTargetMatrix.containsKey(currentNativePlatform)) {
    throw new GradleException("No Rust target mapping configured for $currentNativePlatform")
}

def sourceNativeClasspathDir = file("src/main/resources/overrungl.relativity_craft_rapier")
def generatedNativeHeadersDir = layout.buildDirectory.dir("generated/native-headers")

def nativePackageTaskNames = []
def nativeHeaderTaskNames = []
def previousNativeBuildTaskName = null

nativeTargetMatrix.each { platformId, config ->
    def suffix = nativeTaskSuffix(platformId)
    def buildTaskName = "cargoBuildNative${suffix}"
    def packageClasspathTaskName = "packageNativeClasspath${suffix}"
    def headerTaskName = "syncNativeHeader${suffix}"
    def artifactName = "${nativeArtifactPrefix(config.os)}${nativeLibraryBaseName}.${nativeArtifactExtension(config.os)}"
    def usesZig = nativeUsesZig(config)
    def canBuildOnHost = nativeCanBuildOnHost(overrunglOs, config, zigExecutable)
    def artifactFile = new File(nativeProjectDir, "target/${config.triple}/release/${artifactName}")
    def mustRunAfterTaskName = previousNativeBuildTaskName

    tasks.register(buildTaskName, Exec) {
        group = "native"
        description = "Builds the Rust Rapier library for ${platformId}"
        workingDir = nativeProjectDir
        if (mustRunAfterTaskName != null) {
            mustRunAfter mustRunAfterTaskName
        }
        onlyIf {
            canBuildOnHost
        }
        if (usesZig) {
            environment "CARGO_ZIGBUILD_ZIG_PATH", zigExecutable.absolutePath
            environment "PATH", "${zigExecutable.parentFile.absolutePath}${File.pathSeparator}${System.getenv('PATH')}"
            commandLine "cargo", "zigbuild", "--release", "--target", config.triple
        } else {
            commandLine "cargo", "build", "--release", "--target", config.triple
        }
    }
    previousNativeBuildTaskName = buildTaskName

    tasks.register(packageClasspathTaskName, Sync) {
        group = "native"
        description = "Copies the native Rapier library for ${platformId} into OverrunGL classpath resources"
        dependsOn buildTaskName
        onlyIf {
            artifactFile.exists()
        }
        from(artifactFile)
        into(new File(sourceNativeClasspathDir, "${config.os}-${config.arch}"))
    }

    tasks.register(headerTaskName, Sync) {
        group = "native"
        description = "Copies the generated C header after building ${platformId}"
        dependsOn buildTaskName
        from(new File(nativeProjectDir, "include"))
        into(generatedNativeHeadersDir.map { it.dir(platformId) })
    }

    nativePackageTaskNames.add(packageClasspathTaskName)
    nativeHeaderTaskNames.add(headerTaskName)
}

def currentNativeSuffix = nativeTaskSuffix(currentNativePlatform)
def packageCurrentNativeClasspathTaskName = "packageNativeClasspath${currentNativeSuffix}"
def syncCurrentNativeHeaderTaskName = "syncNativeHeader${currentNativeSuffix}"

tasks.register("buildNativeCurrent") {
    group = "native"
    description = "Builds and packages the current platform native library"
    dependsOn packageCurrentNativeClasspathTaskName, syncCurrentNativeHeaderTaskName
}

tasks.register("buildNativeAll") {
    group = "native"
    description = "Builds and packages all configured native targets. Cross toolchains must already be installed."
    dependsOn nativePackageTaskNames + nativeHeaderTaskNames
}

if ((findProperty("includeNativeCurrent") ?: "false").toBoolean()) {
    tasks.named("processResources").configure {
        dependsOn packageCurrentNativeClasspathTaskName
    }
}

dependencies {
    implementation(platform("io.github.over-run:overrungl-bom:$overrungl_version"))
    implementation("io.github.over-run:overrungl")
    jarJar("io.github.over-run:overrungl:$overrungl_version")
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
